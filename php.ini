; ============================================
; bidernet - PHP Upload Limits Override
; ============================================
; הקובץ הזה מגדיל את הגבלות ההעלאה ל-PHP
; כך שיהיה אפשר להעלות תמונות/וידאו עד 50MB
;
; השם של הקובץ חייב להיות בדיוק: php.ini
; ובאותה תיקייה של api.php
; ============================================

upload_max_filesize = 60M
post_max_size = 65M
memory_limit = 128M
max_execution_time = 120
max_input_time = 120
