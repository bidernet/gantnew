<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בידרנט מערכת גאנטים</title>
  
  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="./favicon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <meta name="theme-color" content="#deeece" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: 'Heebo', system-ui, sans-serif;
      margin: 0;
      direction: rtl;
    }
    @font-face {
      font-family: 'Heebo';
      src: url('https://fonts.gstatic.com/s/heebo/v26/NGSpv5_NC0k9P9H2TbE.woff2') format('woff2');
      font-display: swap;
    }
    #root { min-height: 100vh; }
    
    /* Loading state */
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 1rem;
      font-family: system-ui, sans-serif;
    }
    .app-loading .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Import map: tells the browser where to find React and lucide-react -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="app-loading">
      <div class="spinner"></div>
      <div style="color: #6b7280;">טוען את המערכת...</div>
    </div>
  </div>
  
  <!-- App bundle (compiled from App.jsx) -->
  <script type="module" src="./app.js"></script>
</body>
</html>
